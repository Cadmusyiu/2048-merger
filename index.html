<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="2048 Grip — a sliding-number puzzle. Merge tiles to reach 2048. Play in your browser.">
    <meta name="theme-color" content="#6d7eff">
    <title>2048 Grip</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Nunito', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(160deg, #eef1ff 0%, #f5f5f5 100%);
            color: #333;
            padding: 12px;
        }

        .container {
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .game-title {
            font-size: 38px;
            font-weight: 800;
            color: #6d7eff;
            margin-bottom: 6px;
        }

        .game-intro {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
            padding: 0 12px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: 8px;
            margin-bottom: 14px;
        }

        .scores {
            display: flex;
            gap: 8px;
            flex: 1;
        }

        .score-box {
            flex: 1;
            background: #fff;
            border: 2px solid #e3e7ff;
            border-radius: 10px;
            padding: 6px 10px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(109, 126, 255, 0.08);
        }

        .score-box .label {
            display: block;
            font-size: 11px;
            letter-spacing: 0.5px;
            color: #8a8f9c;
            text-transform: uppercase;
        }

        .score-box .value {
            display: block;
            font-size: 22px;
            font-weight: 800;
            color: #4a54e0;
            line-height: 1.1;
        }

        #restart-btn {
            background: #6d7eff;
            color: #fff;
            border: none;
            padding: 0 16px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 800;
            font-size: 14px;
            transition: background 0.15s ease, transform 0.1s ease;
        }
        #restart-btn:hover { background: #5867e0; }
        #restart-btn:active { transform: scale(0.96); }

        #undo-btn {
            background: #eef1ff;
            color: #4a54e0;
            border: 2px solid #e3e7ff;
            padding: 0 14px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 800;
            font-size: 20px;
            transition: background 0.15s ease, transform 0.1s ease, opacity 0.15s ease;
            touch-action: manipulation;
        }
        #undo-btn:hover:not(:disabled) { background: #e0e4ff; }
        #undo-btn:active:not(:disabled) { transform: scale(0.96); }
        #undo-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        /* +N 得分浮動提示 */
        .score-box { position: relative; }
        #score-gain {
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 15px;
            font-weight: 800;
            color: #f59e0b;
            opacity: 0;
            pointer-events: none;
        }
        #score-gain.float { animation: gainFloat 700ms ease-out; }
        @keyframes gainFloat {
            0%   { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-22px); }
        }

        #game-board {
            position: relative;
            width: 100%;
            max-width: 360px;
            aspect-ratio: 1 / 1;
            background: #d0d4e6;
            border-radius: 14px;
            padding: 10px;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            margin: 0 auto;
        }

        #grid-bg {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            height: 100%;
        }

        .grid-cell {
            background: rgba(255, 255, 255, 0.45);
            border-radius: 8px;
        }

        #tile-layer {
            position: absolute;
            inset: 0;
        }

        .tile {
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            color: #333;
            transition: top 120ms ease, left 120ms ease;
            will-change: top, left;
        }

        /* Tile color scheme (gradients, escalating) */
        .tile-2    { background: linear-gradient(135deg, #ffece0, #ffd9b3); color: #6b5b4d; }
        .tile-4    { background: linear-gradient(135deg, #ffd9a0, #ffc080); color: #6b4d2d; }
        .tile-8    { background: linear-gradient(135deg, #ffb070, #ff8c42); color: #fff; }
        .tile-16   { background: linear-gradient(135deg, #ff8a5b, #ff5e3a); color: #fff; }
        .tile-32   { background: linear-gradient(135deg, #ff6a4d, #ff3b3b); color: #fff; }
        .tile-64   { background: linear-gradient(135deg, #ff5a6e, #e61e4c); color: #fff; }
        .tile-128  { background: linear-gradient(135deg, #ffd75e, #f5a623); color: #fff; box-shadow: 0 0 12px rgba(245, 166, 35, 0.5); }
        .tile-256  { background: linear-gradient(135deg, #ffd24d, #f59e0b); color: #fff; box-shadow: 0 0 14px rgba(245, 158, 11, 0.55); }
        .tile-512  { background: linear-gradient(135deg, #a78bfa, #7c3aed); color: #fff; box-shadow: 0 0 16px rgba(124, 58, 237, 0.55); }
        .tile-1024 { background: linear-gradient(135deg, #22d3ee, #0891b2); color: #fff; box-shadow: 0 0 18px rgba(8, 145, 178, 0.6); }
        .tile-2048 { background: linear-gradient(135deg, #fde68a, #f59e0b, #dc2626); color: #fff; box-shadow: 0 0 24px rgba(220, 38, 38, 0.7); }
        .tile-super{ background: linear-gradient(135deg, #1f2937, #111827); color: #fde68a; box-shadow: 0 0 24px rgba(0, 0, 0, 0.6); }

        /* spawn + merge animations (transform stays free since position uses left/top) */
        .tile-new    { animation: spawn 160ms ease; }
        .tile-merged { animation: pop 200ms ease; z-index: 10; }
        @keyframes spawn { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes pop   { 0% { transform: scale(1); } 50% { transform: scale(1.18); } 100% { transform: scale(1); } }

        #instructions {
            margin-top: 14px;
            color: #8a8f9c;
            font-size: 13px;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: #fff;
            padding: 28px 24px;
            border-radius: 16px;
            text-align: center;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
            animation: pop 260ms ease;
        }

        .modal-content h2 {
            color: #4a54e0;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .modal-content h3 {
            color: #6b7280;
            font-size: 16px;
            margin: 16px 0 8px;
        }
        .modal-content p { color: #555; }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 800;
            font-size: 15px;
            transition: background 0.15s ease, transform 0.1s ease;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: #6d7eff; color: #fff; }
        .btn-primary:hover { background: #5867e0; }
        .btn-secondary { background: #eef1ff; color: #4a54e0; }
        .btn-secondary:hover { background: #e0e4ff; }

        #ranking-list {
            list-style: none;
            margin-top: 4px;
        }
        #ranking-list li {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #f0f0f5;
            color: #555;
            font-weight: 700;
        }
        #ranking-list li:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-title">2048 Grip</div>
        <div class="game-intro">Swipe or use arrow keys to merge equal tiles — reach <strong>2048</strong>!</div>

        <div class="header">
            <div class="scores">
                <div class="score-box">
                    <span class="label">Score</span>
                    <span class="value" id="score-value">0</span>
                    <span id="score-gain"></span>
                </div>
                <div class="score-box">
                    <span class="label">Best</span>
                    <span class="value" id="best-value">0</span>
                </div>
            </div>
            <button id="undo-btn" title="Undo last move" disabled>↩</button>
            <button id="restart-btn" class="btn btn-primary">New Game</button>
        </div>

        <div id="game-board">
            <div id="grid-bg">
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            </div>
            <div id="tile-layer"></div>
        </div>

        <div id="instructions">Arrow keys / WASD / swipe to move</div>
    </div>

    <!-- Win modal -->
    <div id="win-modal" class="modal">
        <div class="modal-content">
            <h2>🎉 You Win!</h2>
            <p>You reached <strong>2048</strong>. Score: <span id="win-score">0</span></p>
            <div class="modal-actions">
                <button id="keep-playing-btn" class="btn btn-secondary">Keep Going</button>
                <button id="win-new-btn" class="btn btn-primary">New Game</button>
            </div>
        </div>
    </div>

    <!-- Game Over modal -->
    <div id="game-over-modal" class="modal">
        <div class="modal-content">
            <h2>Game Over</h2>
            <p>Final score: <span id="final-score">0</span></p>
            <h3>High Scores</h3>
            <ol id="ranking-list"></ol>
            <div class="modal-actions">
                <button id="undo-death-btn" class="btn btn-secondary">↩ Undo</button>
                <button id="close-modal" class="btn btn-primary">Play Again</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
